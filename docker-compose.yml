version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: oi_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-open_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-open_password}
      POSTGRES_DB: ${DB_NAME:-open_innovation}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-open_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - open-innovation

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: oi_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - open-innovation

  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:v1.9.0
    container_name: oi_qdrant
    ports:
      - "6333:6333"
    environment:
      QDRANT_API_KEY: ${QDRANT_API_KEY:-change_me}
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - open-innovation

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: oi_backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: postgresql://${DB_USER:-open_user}:${DB_PASSWORD:-open_password}@postgres:5432/${DB_NAME:-open_innovation}
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      ENVIRONMENT: development
      DEBUG: "True"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    networks:
      - open-innovation
    env_file:
      - ./backend/.env

  # Celery Worker
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: oi_celery_worker
    command: celery -A app.celery_app worker --loglevel=info
    environment:
      DATABASE_URL: postgresql://${DB_USER:-open_user}:${DB_PASSWORD:-open_password}@postgres:5432/${DB_NAME:-open_innovation}
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      - postgres
      - redis
      - backend
    networks:
      - open-innovation
    env_file:
      - ./backend/.env

  # Celery Beat (Scheduler)
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: oi_celery_beat
    command: celery -A app.celery_app beat --loglevel=info
    environment:
      DATABASE_URL: postgresql://${DB_USER:-open_user}:${DB_PASSWORD:-open_password}@postgres:5432/${DB_NAME:-open_innovation}
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      - postgres
      - redis
      - backend
    networks:
      - open-innovation
    env_file:
      - ./backend/.env

  # Next.js Frontend (optional, can be run locally)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: oi_frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api
    depends_on:
      - backend
    networks:
      - open-innovation
    env_file:
      - ./frontend/.env.local

volumes:
  postgres_data:
  redis_data:
  qdrant_data:

networks:
  open-innovation:
    driver: bridge
